name: Build And Publish ZIP Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Extension
        run: npm run build

      - name: Package ZIP
        shell: pwsh
        run: ./scripts/package-release.ps1

      - name: Resolve ZIP Path
        id: zip
        shell: bash
        run: |
          ZIP_FILE=$(ls -1 release/*.zip | sort | tail -n 1)
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"
          echo "zip_name=$(basename "$ZIP_FILE")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release And Upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.zip.outputs.zip_file }}
